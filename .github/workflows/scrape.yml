name: 🤖 Autonomous News Ingestion

on:
  repository_dispatch:
    types: [trigger-scrape]
  schedule:
    # Run every 30 minutes, 24/7 (GitHub min interval is 5min, but 30min is safer for free tier)
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no database writes)?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  scrape:
    name: Scrape & Ingest News
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline

      - name: 🔍 Verify secrets are set
        run: |
          if [ -z "$SUPABASE_URL" ]; then echo "❌ SUPABASE_URL is not set!"; exit 1; fi
          if [ -z "$SUPABASE_KEY" ]; then echo "❌ SUPABASE_KEY is not set!"; exit 1; fi
          if [ -z "$GEMINI_API_KEY" ]; then echo "❌ GEMINI_API_KEY is not set!"; exit 1; fi
          echo "✅ All secrets present"
          echo "SUPABASE_URL: ${SUPABASE_URL:0:40}..."
          echo "GEMINI_API_KEY starts with: ${GEMINI_API_KEY:0:5}..."
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}

      - name: 🗞️ Run scraper (live)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: npm run scrape
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}

      - name: 🧪 Run scraper (dry-run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: npm run scrape:dry
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}

      - name: 📊 Log completion
        if: always()
        run: echo "Scraper run completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
