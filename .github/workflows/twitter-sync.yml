name: 🐦 Twitter/X Social Sync

on:
  schedule:
    # Run at 07:00 and 16:00 UTC (10:00 AM and 19:00 PM Athens EEST)
    - cron: '0 7,16 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  sync:
    name: Sync Articles to Twitter
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🔗 Trigger Twitter/X Social Sync Endpoint
        run: |
          curl -f -X GET "https://www.panathinaikosnews.gr/api/sys/social-sync?secret=pao_social_sync_secret_123"
