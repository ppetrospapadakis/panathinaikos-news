<body class="bg-surface text-on-surface font-body overflow-hidden">

        </div>
        <div class="flex items-center gap-4">

        </div>
        <nav class="flex-1 flex flex-col gap-2">

    <main class="ml-[256px] mt-16 h-[calc(100vh-64px)] flex flex-col overflow-y-auto content-container">
        <!-- Main Article Area -->
        <section class="flex-1 py-16 px-8 flex justify-center">
            <article class="w-full max-w-[800px] bg-transparent space-y-8" id="article-loader-placeholder">
                <!-- Skeleton Loader -->
                <div class="animate-pulse space-y-6">
                    <div class="h-8 bg-surface-container-high w-1/4 rounded"></div>
                    <div class="h-12 bg-surface-container-high w-3/4 rounded"></div>
                    <div class="h-64 bg-surface-container-high w-full rounded-xl"></div>
                    <div class="h-4 bg-surface-container-high w-full rounded"></div>
                    <div class="h-4 bg-surface-container-high w-5/6 rounded"></div>
                </div>
            </article>

            <!-- Dynamic Article Content (Hidden initially) -->
            <article class="w-full max-w-[800px] bg-transparent space-y-8 hidden" id="article-display-container">
                <!-- Category and Date -->
                <div class="flex items-center gap-4 text-xs font-label text-primary uppercase tracking-wider">
                    <span id="article-category">Κατηγορία</span>
                    <span>•</span>
                    <span id="article-date">Ημερομηνία</span>
                    <span>•</span>
                    <span id="article-source">Πηγή</span>
                </div>

                <!-- Main Title -->
                <h1 class="font-display-l text-display-l text-on-surface leading-tight" id="article-title">
                    Φόρτωση τίτλου...
                </h1>

                <!-- Article Image Banner -->
                <div class="relative w-full aspect-video rounded-xl overflow-hidden bg-surface-container-low border border-outline-variant/20 shadow-lg" id="article-image-box">
                    <img class="w-full h-full object-cover" id="article-image" src="" alt="Article Banner"/>
                </div>

                <!-- AI Quick-Takes Bullets Box -->
                <div class="p-24 bg-surface-container-low rounded-2xl border border-primary/20 space-y-16" id="article-bullets-box">
                    <div class="flex items-center gap-8 text-primary font-bold text-sm uppercase tracking-widest">
                        <span class="material-symbols-outlined text-[18px]">bolt</span>
                        <span>F5 Quick-Takes (AI Summary)</span>
                    </div>
                    <ul class="list-disc pl-16 space-y-8 text-on-surface-variant leading-relaxed text-body" id="article-bullets-list">
                        <!-- Bullets go here -->
                    </ul>
                </div>

                <!-- Main Summary / Content -->
                <div class="font-body-lg text-body-lg text-on-surface-variant leading-relaxed space-y-6" id="article-text-body">
                    <!-- Text content goes here -->
                </div>

                <!-- Original Link Action Button -->
                <div class="pt-24 border-t border-outline-variant/30 text-center">
                    <a class="inline-flex items-center gap-12 px-24 py-16 bg-primary text-on-primary font-h4 text-h4 font-bold rounded-xl hover:opacity-90 active:scale-[0.98] transition-all shadow-md" id="article-original-link" href="#" target="_blank">
                        <span>Διαβάστε το πλήρες ρεπορτάζ στο <span id="article-source-name">Gazzetta</span></span>
                        <span class="material-symbols-outlined">open_in_new</span>
                    </a>
                </div>
            </article>
        </section>

    <!-- Supabase SDK & Controller -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase configuration
        const SUPABASE_URL = 'https://rctltbuiitdnqlxizlym.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJjdGx0YnVpaXRkbnFseGl6bHltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDc4MjMsImV4cCI6MjA5ODkyMzgyM30.DVTtDjeh1TM2HsmMhEsVVxtJ7CKBfy-2iHsWRX8oumI';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Helper: format domain name
        function extractSourceDomain(url) {
            try {
                const domain = new URL(url).hostname;
                return domain.replace('www.', '').split('.')[0];
            } catch (e) {
                return 'News';
            }
        }

        // Fetch single article
        async function loadArticle() {
            try {
                // Get URL parameter id
                const urlParams = new URLSearchParams(window.location.search);
                const articleId = urlParams.get('id');

                if (!articleId) {
                    throw new Error('Δεν προσδιορίστηκε ID άρθρου.');
                }

                // Query Supabase for article details
                const { data: article, error } = await supabaseClient
                    .from('articles')
                    .select('*')
                    .eq('id', articleId)
                    .single();

                if (error) throw error;
                if (!article) throw new Error('Το άρθρο δεν βρέθηκε.');

                // Fill details in UI
                document.getElementById('header-category').textContent = article.category || 'Ποδόσφαιρο';
                document.getElementById('article-category').textContent = article.category || 'Ποδόσφαιρο';
                document.getElementById('article-title').textContent = article.title;
                
                // Format Date
                const publishDate = new Date(article.created_at);
                const formattedDate = publishDate.toLocaleDateString('el-GR', {
                    day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit'
                });
                document.getElementById('article-date').textContent = formattedDate;

                // Domain name
                const domain = extractSourceDomain(article.source_url);
                document.getElementById('article-source').textContent = domain.toUpperCase();
                document.getElementById('article-source-name').textContent = domain.toUpperCase();
                document.getElementById('article-original-link').href = article.source_url;

                // Image Banner
                if (article.image_url) {
                    document.getElementById('article-image').src = article.image_url;
                } else {
                    document.getElementById('article-image-box').style.display = 'none';
                }

                // AI Bullets List
                const bulletsList = document.getElementById('article-bullets-list');
                bulletsList.innerHTML = '';
                if (article.bullets && article.bullets.length > 0) {
                    article.bullets.forEach(bullet => {
                        const li = document.createElement('li');
                        li.textContent = bullet;
                        bulletsList.appendChild(li);
                    });
                } else {
                    document.getElementById('article-bullets-box').style.display = 'none';
                }

                // Article Content body
                const textBody = document.getElementById('article-text-body');
                textBody.innerHTML = '';
                
                // Show content if it exists, otherwise fall back to summary
                const bodyText = article.content || article.summary || '';
                if (bodyText) {
                    // Split paragraphs by double newline and render them
                    const paragraphs = bodyText.split('\n');
                    paragraphs.forEach(p => {
                        const trimmed = p.trim();
                        if (trimmed) {
                            const pElem = document.createElement('p');
                            pElem.textContent = trimmed;
                            textBody.appendChild(pElem);
                        }
                    });
                } else {
                    textBody.innerHTML = '<p class="italic text-on-surface-variant/70">Δεν υπάρχει διαθέσιμο κείμενο άρθρου.</p>';
                }

                // Toggle visibility
                document.getElementById('article-loader-placeholder').style.display = 'none';
                document.getElementById('article-display-container').classList.remove('hidden');

            } catch (err) {
                console.error('Error loading article:', err);
                document.getElementById('article-loader-placeholder').innerHTML = `
                    <div class="p-32 bg-error-container/20 border border-error/20 text-error rounded-xl text-center font-body space-y-4">
                        <span class="material-symbols-outlined text-4xl">error</span>
                        <p class="font-h3">Σφάλμα κατά τη φόρτωση του άρθρου</p>
                        <p class="text-sm">${err.message}</p>
                        <button class="mt-8 px-16 py-8 bg-surface-container border border-outline-variant rounded hover:bg-surface-container-high" onclick="window.location.href='index.html'">Επιστροφή στην Αρχική</button>
                    </div>
                `;
            }
        }

        window.addEventListener('DOMContentLoaded', loadArticle);
    </script>
